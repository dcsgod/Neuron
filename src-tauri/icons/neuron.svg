<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Glow blob -->
  <ellipse cx="256" cy="256" rx="160" ry="160" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Neural N shape: nodes + connections -->
  <!-- Left column nodes -->
  <circle cx="168" cy="160" r="16" fill="#7c3aed"/>
  <circle cx="168" cy="256" r="16" fill="#7c3aed"/>
  <circle cx="168" cy="352" r="16" fill="#7c3aed"/>

  <!-- Right column nodes -->
  <circle cx="344" cy="160" r="16" fill="#7c3aed"/>
  <circle cx="344" cy="256" r="16" fill="#7c3aed"/>
  <circle cx="344" cy="352" r="16" fill="#7c3aed"/>

  <!-- Center node -->
  <circle cx="256" cy="256" r="20" fill="#a78bfa" filter="url(#glow-filter)"/>

  <!-- N strokes: left vertical, diagonal, right vertical -->
  <line x1="168" y1="160" x2="168" y2="352" stroke="#7c3aed" stroke-width="12" stroke-linecap="round"/>
  <line x1="168" y1="160" x2="344" y2="352" stroke="#a78bfa" stroke-width="10" stroke-linecap="round"/>
  <line x1="344" y1="160" x2="344" y2="352" stroke="#7c3aed" stroke-width="12" stroke-linecap="round"/>

  <!-- Cross connections for neural look -->
  <line x1="168" y1="256" x2="256" y2="256" stroke="#4c1d95" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="256" y1="256" x2="344" y2="256" stroke="#4c1d95" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- Bright node highlights -->
  <circle cx="168" cy="160" r="6" fill="#c4b5fd"/>
  <circle cx="344" cy="352" r="6" fill="#c4b5fd"/>
  <circle cx="256" cy="256" r="8" fill="white" opacity="0.9"/>
</svg>
